name: Reusable Echo Workflow

on:
  workflow_call:
    inputs:
      message:
        description: 'Input string to echo'
        required: true
        type: string

jobs:
  echo-job:
    runs-on: ubuntu-latest
    steps:
      - name: Echo input and secret
        env:
          MY_SECRET: ${{ secrets.ABC }}
        run: |
          echo "Input message: ${{ inputs.message }}"
          # Masking still applies here
          echo "Secret (Base64): $(echo -n "$MY_SECRET" | base64)"
